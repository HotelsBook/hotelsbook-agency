{% extends "base.html" %}

{% block content %}
<section class="max-w-4xl mx-auto px-4 py-16">
  
  <!-- Título da Página com Nova Cor -->
  <h1 class="text-3xl md:text-4xl font-extrabold text-hospped-primary mb-8 leading-tight">
    {{ page.title }}
  </h1>
  
  <!-- Conteúdo da Página com Tipografia Otimizada -->
  <article class="prose prose-lg max-w-none text-gray-700 leading-relaxed 
                  prose-headings:text-hospped-primary 
                  prose-a:text-hospped-secondary 
                  prose-a:no-underline 
                  prose-a:hover:text-hospped-secondaryHover 
                  prose-strong:text-hospped-primary
                  prose-ul:list-disc 
                  prose-ol:list-decimal 
                  prose-li:marker:text-hospped-secondary">
    {{ page.content }}
  </article>
  
  <!-- Divider Decorativo (opcional) -->
  <div class="mt-12 pt-8 border-t border-hospped-primary/20">
    <p class="text-xs text-gray-400">
      Última atualização: {{ page.locale_date|default(page.date) }}
    </p>
  </div>
  
</section>
{% endblock %}
