name: Build and Deploy Hospped Site

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite acionar manualmente pelo botão no GitHub

# Permissões necessárias para o GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Concorrência: cancela builds anteriores se um novo for iniciado
concurrency:
  group: "pages"
  cancel-in-progress: true  # Economiza recursos ao cancelar builds obsoletos

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache de dependências do Pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Limpar pasta de saída anterior
        run: rm -rf output
      
      - name: Gerar o Site (Pelican Build)
        run: pelican content -o output -s pelicanconf.py
        env:
          PELICAN_ENV: production  # Garante configurações de produção
      
      - name: Validar output gerado
        run: |
          if [ ! -d "output" ] || [ -z "$(ls -A output)" ]; then
            echo "Erro: Pasta output está vazia ou não foi gerada"
            exit 1
          fi
          echo "Output válido com $(ls output | wc -l) arquivos"
      
      - name: Upload do Artifact (Páginas)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './output'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4